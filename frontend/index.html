<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>
<body class="d-flex justify-content-center align-items-center vh-100 bg-light">

<div class="card p-4 shadow" style="width:300px;">
<h3 class="text-center">Chat App</h3>

<input id="username" class="form-control mb-2" placeholder="Username">
<input id="password" type="password" class="form-control mb-2" placeholder="Password">

<button onclick="login()" class="btn btn-primary mb-2">Login</button>
<button onclick="register()" class="btn btn-success">Register</button>

<p id="msg" class="text-danger mt-2"></p>
</div>

<script src="login.js"></script>
</body>
</html>
